<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindSet | Inicialização</title>
    
    <link rel="stylesheet" href="css/main.css">

    <link rel="apple-touch-icon" href="assets/icone-ios.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MindSet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDRs0XmGYfoeaSHBMBIWBRGJqIVQcaJKUc",
        authDomain: "mindset-7348d.firebaseapp.com",
        projectId: "mindset-7348d",
        storageBucket: "mindset-7348d.firebasestorage.app",
        messagingSenderId: "239649616932",
        appId: "1:239649616932:web:2e0a5391a50a8f7d0e94b1",
        measurementId: "G-W9VSMT8S5S"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
    </script>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "d9697834-3a0a-4609-b40d-8bc611eb9163",
          allowLocalhostAsSecureOrigin: true,
          promptOptions: { slidedown: { enabled: false } }
        });
      });
    </script>
</head>
<body id="main-body">

    <div id="demo-overlay" class="demo-overlay" style="display:none;"></div>
    <div id="demo-guide" class="demo-guide" style="display:none;"></div>

    <div id="pwa-install-container">
        <div id="install-card">
            <div class="install-content">
                <h1 class="install-logo">MINDSET</h1>
                <div class="stage-premium">
                    <div class="icon-box-premium">
                        <svg class="svg-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 4v10"></path>
                            <path d="M7 11l5 5 5-5"></path>
                            <rect x="5" y="18" width="14" height="2.8" rx="1.4" fill="currentColor" stroke="none"></rect>
                        </svg>
                    </div>
                </div>
                <p class="install-text">Construa sua nova mentalidade com a experiência completa de aplicativo.</p>
                <div class="install-actions">
                    <button id="btn-do-install" class="btn-install-premium">INSTALAR AGORA</button>
                    <button id="btn-later" class="btn-later-premium" onclick="document.getElementById('pwa-install-container').style.display='none'">AGORA NÃO</button>
                </div>
            </div>
        </div>
    </div>

    <section id="step-welcome" class="screen active">
        <div class="form-container" style="text-align: center;">
            <h1 class="logo">MindSet</h1>
            <p class="welcome-text">Te ajudaremos a construir uma nova mentalidade e reprogramar seus hábitos de forma definitiva.</p>
            <button class="btn-main" onclick="startOnboarding()">COMEÇAR</button>
        </div>
    </section>

    <section id="step-registration" class="screen gender-ele">
        <div class="form-container">
            <h1 class="logo" style="font-size: 2rem; margin-bottom: 20px;">MindSet</h1>
            <div class="input-group" id="group-name">
                <label>COMO DEVEMOS TE CHAMAR?</label>
                <input type="text" id="user-name" placeholder="Digite seu nome ou apelido..." autocomplete="off">
            </div>
            <div class="input-group" id="group-gender">
                <label>GÊNERO</label>
                <div class="gender-toggle-wrapper">
                    <input type="checkbox" id="gender-toggle" hidden>
                    <div class="toggle-pill"></div>
                    <label for="gender-toggle" class="gender-btn btn-ele">ELE</label>
                    <label for="gender-toggle" class="gender-btn btn-ela">ELA</label>
                </div>
            </div>
            <div class="input-group" id="group-age">
                <label>IDADE</label>
                <div class="age-selector-container">
                    <div class="age-selection-marker"></div>
                    <div class="age-carousel-track" id="age-carousel-track"></div>
                </div>
            </div>
            <button class="btn-main" onclick="nextStep()">AVANÇAR</button>
        </div>
    </section>

    <section id="step-carousel" class="screen">
        <button class="btn-back" onclick="prevStep()">← VOLTAR</button>
        <div class="carousel-header"><span id="welcome-name"></span>, ESCOLHA SEU NOVO SETUP:</div>
        <div class="carousel-wrapper">
            <div class="carousel-container" id="carousel-list"></div>
        </div>
        <div class="carousel-footer">
            <p style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 15px;">DESLIZE PARA OS LADOS</p>
            <button class="btn-confirm" onclick="confirmSelection()">INICIAR MINDSET</button>
        </div>
    </section>

    <div id="spotlight-overlay" class="spotlight-overlay"></div>
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">AVISO</h3>
            <p id="modal-message"></p>
            <div id="modal-buttons" class="modal-buttons"></div>
        </div>
    </div>

    <script src="js/notifications.js"></script>
    <script src="js/main.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            // Unificamos o registro aqui
            navigator.serviceWorker.register('./sw.js')
              .then(reg => console.log("SW MindSet Ativo"))
              .catch(err => console.error("Erro SW:", err));
        });
      }
    </script>
</body>
</html>
